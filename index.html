        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap");
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                background: rgb(16, 23, 41);
                color: #fff;
                overflow: hidden;
            }
            .maplibregl-ctrl-logo,
            .maplibregl-ctrl-attrib {
                opacity: 0.3;
            }
            #map {
                width: 100vw;
                height: 100vh;
                position: relative;
                z-index: 0;
                outline: none;
            }
            #map:focus,
            #map canvas:focus,
            #map canvas {
                outline: none;
            }
            .panel {
                z-index: 12;
            }
            #tooltip {
                z-index: 13;
            }
            /* Tooltip */
            #tooltip {
                position: absolute;
                padding: 14px 16px;
                background: rgb(16, 23, 41);
                border: 1px solid rgba(255, 255, 255, 0.07);
                border-radius: 6px;
                font-size: 14px;
                pointer-events: none;
                display: none;
                max-width: 320px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            }
            #tooltip h3 {
                color: #fff;
                margin-bottom: 6px;
                font-size: 14px;
                font-weight: 500;
                line-height: 1.3;
            }
            #tooltip p {
                margin: 3px 0;
                color: rgba(255, 255, 255, 0.4);
                font-size: 12px;
            }
            #tooltip span {
                color: rgba(255, 255, 255, 0.75);
            }

            /* Shared panel */
            .panel {
                opacity: 0.97;
                position: absolute;
                background: rgb(16, 23, 41);
                border: 1px solid rgba(255, 255, 255, 0.07);
                border-radius: 6px;
                padding: 14px 16px;
                font-size: 14px;
                overflow-y: auto;
                max-height: calc(100vh - 40px);
            }
            .panel::-webkit-scrollbar {
                width: 3px;
            }
            .panel::-webkit-scrollbar-track {
                background: transparent;
            }
            .panel::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 3px;
            }
            .panel-header {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 4px;
            }
            .panel-dot {
                color: #6c8eff;
                font-size: 14px;
                line-height: 1;
                padding-bottom: 3px;
            }
            .panel-header h2 {
                color: rgba(255, 255, 255, 0.9);
                font-size: 14px;
                font-weight: 500;
                letter-spacing: 0.02em;
            }
            .lang-switcher {
                display: flex;
                gap: 2px;
                margin-left: auto;
            }
            .lang-btn {
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 3px;
                color: rgba(255, 255, 255, 0.38);
                font-family: inherit;
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.05em;
                padding: 2px 5px;
                cursor: pointer;
                transition:
                    background 0.15s,
                    color 0.15s,
                    border-color 0.15s;
                line-height: 1.4;
            }
            .lang-btn:hover {
                background: rgba(255, 255, 255, 0.1);
                color: rgba(255, 255, 255, 0.7);
            }
            .lang-btn.active {
                background: rgba(108, 142, 255, 0.15);
                border-color: rgba(108, 142, 255, 0.4);
                color: #6c8eff;
            }
            .panel-subtitle {
                color: rgba(255, 255, 255, 0.35);
                font-size: 11px;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                padding-bottom: 10px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            }
            .panel-controls {
                display: flex;
                gap: 6px;
                padding: 10px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                margin-bottom: 10px;
            }
            .panel-controls button {
                flex: 1;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 4px;
                color: rgba(255, 255, 255, 0.55);
                font-family: inherit;
                font-size: 12px;
                padding: 8px 0;
                cursor: pointer;
                transition:
                    background 0.15s,
                    color 0.15s;
                letter-spacing: 0.03em;
            }
            .panel-controls button:hover,
            .panel-controls button:active {
                background: rgba(255, 255, 255, 0.12);
                color: rgba(255, 255, 255, 0.9);
            }
            .panel-controls button.active {
                background: rgba(255, 203, 153, 0.18);
                border-color: rgba(255, 203, 153, 0.5);
                color: rgb(255, 203, 153);
            }
            #night-view-controls {
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                border-bottom: none;
                margin-bottom: 0;
            }
            #night-intensity-row {
                max-height: 0;
                opacity: 0;
                overflow: hidden;
                padding: 0 0;
                transition:
                    max-height 0.3s ease,
                    opacity 0.25s ease,
                    padding 0.3s ease;
            }
            #night-intensity-row.visible {
                max-height: 60px;
                opacity: 1;
                padding: 10px 0 14px;
            }
            #night-intensity-row input[type="range"] {
                width: 100%;
                accent-color: rgba(255, 197, 143, 0.9);
                cursor: pointer;
            }

            /* Legend — right */
            #legend {
                top: 20px;
                right: 20px;
                min-width: 285px;
                padding: 14px 16px;
            }
            .legend-item {
                display: flex;
                align-items: center;
                margin: 4px 0;
                gap: 8px;
                cursor: pointer;
                user-select: none;
                transition: opacity 0.15s;
                padding: 4px 4px;
                border-radius: 4px;
            }
            .legend-item:hover,
            .legend-item:active {
                opacity: 0.8;
            }
            .legend-item.inactive {
                opacity: 0.3;
            }
            .legend-item.inactive .legend-color {
                filter: grayscale(1);
            }
            .legend-color {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                flex-shrink: 0;
                transition: filter 0.15s;
            }
            .legend-label {
                color: rgba(255, 255, 255, 0.65);
                font-size: 13px;
                flex: 1;
            }
            .legend-count {
                color: rgba(255, 255, 255, 0.25);
                font-size: 12px;
            }

            /* Canton panel — left */
            #canton-panel {
                top: 20px;
                left: 20px;
                min-width: 285px;
                max-height: calc(100vh - 40px);
            }
            .canton-item {
                display: flex;
                align-items: center;
                margin: 4px 0;
                gap: 8px;
                cursor: pointer;
                user-select: none;
                transition: opacity 0.15s;
                padding: 4px 4px;
                border-radius: 4px;
            }
            .canton-item:hover,
            .canton-item:active {
                background: rgba(255, 255, 255, 0.04);
            }
            .canton-item.inactive {
                opacity: 0.35;
            }
            .canton-badge {
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.05em;
                background: rgba(255, 255, 255, 0.08);
                border-radius: 3px;
                padding: 3px 6px;
                color: rgba(255, 255, 255, 0.6);
                min-width: 30px;
                text-align: center;
                transition:
                    background 0.15s,
                    color 0.15s;
            }
            .canton-item.active .canton-badge {
                background: rgba(108, 142, 255, 0.2);
                color: #6c8eff;
            }
            .canton-name {
                color: rgba(255, 255, 255, 0.6);
                font-size: 13px;
                flex: 1;
            }
            .canton-count {
                color: rgba(255, 255, 255, 0.2);
                font-size: 12px;
            }

            /* Panel collapse toggle */
            .panel-toggle {
                display: none;
                position: absolute;
                width: 44px;
                height: 44px;
                background: rgb(16, 23, 41);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                z-index: 10;
                font-size: 16px;
                color: #fff;
            }
            #toggle-canton {
                top: 20px;
                left: 20px;
            }
            #toggle-legend {
                top: 20px;
                right: 20px;
            }

            /* Tooltip close button (mobile) */
            #tooltip-close {
                display: none;
                position: absolute;
                top: 8px;
                right: 10px;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                font-size: 18px;
                cursor: pointer;
                padding: 4px;
                line-height: 1;
            }

            #title {
                z-index: 10;
            }

            @media (max-width: 980px) {
                .panel-toggle {
                    display: flex;
                }
                /* Panels become full-width bottom sheets */
                .panel {
                    position: fixed !important;
                    top: auto !important;
                    left: 0 !important;
                    right: 0 !important;
                    bottom: 0 !important;
                    width: 100% !important;
                    max-height: 75vh;
                    min-width: unset;
                    border-radius: 16px 16px 0 0;
                    border-left: none;
                    border-right: none;
                    border-bottom: none;
                    transform: translateY(100%);
                    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
                    overflow-y: auto;
                    display: block;
                    /* drag handle */
                    padding-top: 20px;
                }
                .panel::before {
                    content: "";
                    display: block;
                    width: 36px;
                    height: 4px;
                    background: rgba(255, 255, 255, 0.15);
                    border-radius: 2px;
                    margin: -12px auto 12px;
                }
                .panel.open {
                    transform: translateY(0);
                }
                #tooltip {
                    max-width: calc(100vw - 20px);
                    left: 10px !important;
                    right: 10px;
                }
                #tooltip-close {
                    display: block;
                }
                .maplibregl-ctrl-bottom-right {
                    bottom: 16px !important;
                    right: 16px !important;
                }
            }
            .maplibregl-ctrl-group {
                background: rgb(16, 23, 41) !important;
                border: 1px solid rgba(255, 255, 255, 0.07) !important;
                border-radius: 6px !important;
                overflow: hidden;
            }
            .maplibregl-ctrl-group button {
                background: transparent !important;
                border: none !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
                width: 36px !important;
                height: 36px !important;
            }
            .maplibregl-ctrl-group button:last-child {
                border-bottom: none !important;
            }
            .maplibregl-ctrl-group button:hover {
                background: rgba(255, 255, 255, 0.08) !important;
            }
            .maplibregl-ctrl-group button .maplibregl-ctrl-icon {
                filter: invert(1) brightness(0.7);
            }
            .maplibregl-ctrl-compass .maplibregl-ctrl-icon {
                transform: none;
            }
            .maplibregl-ctrl-zoom-in .maplibregl-ctrl-icon {
                filter: invert(1) brightness(0.7);
            }
            .maplibregl-ctrl-zoom-out .maplibregl-ctrl-icon {
                filter: invert(1) brightness(0.7);
            }
            .maplibregl-ctrl-attrib,
            .maplibregl-ctrl-attrib-inner,
            .maplibregl-compass,
            .maplibregl-ctrl-group {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>

            // ── Helpers ────────────────────────────────────────────────────────────
            function hexToRgb(hex) {
                const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return r
                    ? [
                          parseInt(r[1], 16),
                          parseInt(r[2], 16),
                          parseInt(r[3], 16),
                      ]
                    : [100, 100, 100];
            }

            function getColor(rechtsform) {
                const rf = rechtsform.toUpperCase();
                for (const a of colorAssignments) {
                    if (rf.includes(a.rfKey)) return hexToRgb(a.hex);
                }
                return hexToRgb("#1a1a30");
            }

            // Map any rechtsform string → the matching colorAssignment label
            function getLabel(rechtsform) {
                const rf = rechtsform.toUpperCase();
                for (const a of colorAssignments) {
                    if (rf.includes(a.rfKey)) return a.label;
                }
                return rechtsform;
            }

            // ── State ──────────────────────────────────────────────────────────────
            const activeLabels = new Set(colorAssignments.map((a) => a.label)); // active legal forms
            const activeCantons = new Set();
            let displayTotal = 0;
            const BERN = { lng: 7.44, lat: 46.95 };
            let nightView = false;
            let anchorIntensity = 50;
            let anchorZoom = 12;
            const nightColor = [255, 197, 143];
            function effectiveIntensity() {
                const z = map.getZoom();
                if (z <= anchorZoom) {
                    if (anchorZoom <= 6) return anchorIntensity;
                    const t = Math.max(0, (z - 6) / (anchorZoom - 6));
                    return Math.max(
                        1,
                        Math.round(1 + (anchorIntensity - 1) * t),
                    );
                } else {
                    if (anchorZoom >= 16) return anchorIntensity;
                    const t = Math.min(1, (z - anchorZoom) / (16 - anchorZoom));
                    return Math.min(
                        100,
                        Math.round(
                            anchorIntensity + (100 - anchorIntensity) * t,
                        ),
                    );
                }
            }
            const cantonData = {}; // id → point array
            let overlay = null;
            let map = null;

            const T_DECODE = {
                A: "Aktiengesellschaft",
                L: "Ausländische Niederlassung",
                B: "Besondere Rechtsform",
                E: "Einzelunternehmen",
                N: "Genossenschaft",
                G: "GmbH / SARL",
                H: "Haupt von Gemeinderschaften",
                I: "Institut des öffentlichen Rechts",
                K: "Kollektivgesellschaft",
                O: "Kommanditgesellschaft",
                Z: "Schweizerische Zweigniederlassung",
                S: "Stiftung",
                V: "Verein",
            };

            // ── Parse canton data — groups co-located companies into one point ─────
            function parseCantonData(col, cantonId) {
                const byPos = new Map();
                const count = col.n.length;

                for (let i = 0; i < count; i++) {
                    const tRaw = col.t[i] || "";
                    const rechtsform = (T_DECODE[tRaw] || tRaw).trim();
                    if (!rechtsform) continue;
                    const lat = col.lat[i];
                    const lng = col.lng[i];
                    if (!lat || !lng) continue;

                    const key =
                        Math.round(lat * 1e5) * 1000000 + Math.round(lng * 1e5);
                    const label = getLabel(rechtsform);
                    const company = {
                        name: col.n[i] || "",
                        rechtsform,
                        label,
                        address: "",
                        uid: "",
                    };

                    if (!byPos.has(key)) {
                        byPos.set(key, {
                            position: [lng, lat],
                            canton: cantonId,
                            companies: [],
                            rechtsform,
                            label,
                            color: getColor(rechtsform),
                        });
                    }
                    byPos.get(key).companies.push(company);
                }

                return Array.from(byPos.values());
            }

            // ── Recompute legend counts from active cantons ────────────────────────────
            function updateLegendCounts() {
                const counts = {};
                Object.values(cantonData)
                    .flat()
                    .filter((d) => activeCantons.has(d.canton))
                    .forEach((p) =>
                        p.companies.forEach((c) => {
                            counts[c.label] = (counts[c.label] || 0) + 1;
                        }),
                    );
                document.querySelectorAll(".legend-item").forEach((el) => {
                    const label = el.dataset.label;
                    el.querySelector(".legend-count").textContent =
                        `(${counts[label] || 0})`;
                });
            }

            function showLoadError(cantonId) {
                const el = document.createElement("div");
                el.style.cssText =
                    "position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(200,60,60,0.85);color:#fff;padding:8px 16px;border-radius:4px;font-size:13px;z-index:20;pointer-events:none";
                el.textContent = `Failed to load ${cantonId} data. Try reloading.`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }

            async function gunzipJson(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const ds = new DecompressionStream("gzip");
                const blob = await new Response(
                    res.body.pipeThrough(ds),
                ).blob();
                return JSON.parse(await blob.text());
            }

            async function loadCantonChunk(cantonId, chunk) {
                return gunzipJson(`data/${cantonId}_${chunk}.json.gz`);
            }

            async function loadCantonAll(cantonId) {
                const meta = await fetch(`data/${cantonId}.json`).then((r) =>
                    r.json(),
                );
                let chunkPromises;
                if (Array.isArray(meta.chunks)) {
                    // Format: { chunks: ["XX_0.json.gz", ...] }
                    chunkPromises = meta.chunks.map((filename) =>
                        gunzipJson(`data/${filename}`),
                    );
                } else {
                    // Format: { _chunks: N }
                    chunkPromises = Array.from(
                        { length: meta._chunks },
                        (_, i) => loadCantonChunk(cantonId, i),
                    );
                }
                const chunks = await Promise.all(chunkPromises);
                return {
                    n: chunks.flatMap((c) => c.n),
                    t: chunks.flatMap((c) => c.t),
                    lat: chunks.flatMap((c) => c.lat),
                    lng: chunks.flatMap((c) => c.lng),
                };
            }

            // ── Load BS and build legend counts ───────────────────────────────────
            async function loadBsData() {
                const rows = await loadCantonAll("BS");
                const points = parseCantonData(rows, "BS");

                const counts = {};
                points.forEach((p) =>
                    p.companies.forEach((c) => {
                        counts[c.label] = (counts[c.label] || 0) + 1;
                    }),
                );

                const legendEl = document.getElementById("legend-items");
                colorAssignments.forEach((item) => {
                    const div = document.createElement("div");
                    div.className = "legend-item";
                    div.dataset.label = item.label;
                    div.innerHTML = `
          <div class="legend-color" style="background:${item.hex}"></div>
          <span class="legend-label">${item.label}</span>
          <span class="legend-count">(${counts[item.label] || 0})</span>`;
                    legendEl.appendChild(div);
                });

                return points;
            }

            // ── Load any canton from its chunks ───────────────────────────────────
            async function loadCantonData(canton) {
                if (cantonData[canton.id] !== undefined)
                    return cantonData[canton.id];

                const countEl = document.querySelector(
                    `.canton-item[data-id="${canton.id}"] .canton-count`,
                );
                if (countEl) countEl.textContent = "…";

                try {
                    const rows = await loadCantonAll(canton.id);
                    const points = parseCantonData(rows, canton.id);
                    cantonData[canton.id] = points;
                    const companyCount = points.reduce(
                        (s, p) => s + p.companies.length,
                        0,
                    );
                    if (countEl)
                        countEl.textContent = `(${companyCount.toLocaleString()})`;
                    return points;
                } catch (e) {
                    cantonData[canton.id] = [];
                    if (countEl) countEl.textContent = "(–)";
                    showLoadError(canton.id);
                    return [];
                }
            }

            // ── Layer builder ──────────────────────────────────────────────────────
            function buildLayer() {
                const all = Object.values(cantonData).flat();
                const visible = all.filter(
                    (d) =>
                        activeCantons.has(d.canton) &&
                        d.companies.some((c) => activeLabels.has(c.label)),
                );
                return new deck.ScatterplotLayer({
                    id: "companies",
                    data: visible,
                    getPosition: (d) => d.position,
                    getFillColor: (d) => {
                        if (nightView) {
                            return [
                                ...nightColor,
                                Math.round(255 * (effectiveIntensity() / 100)),
                            ];
                        }
                        const matched = d.companies.find((c) =>
                            activeLabels.has(c.label),
                        );
                        if (matched)
                            return [...getColor(matched.rechtsform), 230];
                        return [...d.color, 230];
                    },
                    getRadius: 18,
                    radiusScale: 1,
                    radiusMinPixels: nightView ? RADIUS_MIN * 0.9 : RADIUS_MIN,
                    radiusMaxPixels: nightView ? RADIUS_MAX * 0.9 : RADIUS_MAX,
                    pickable: true,
                    opacity: 1,
                    stroked: false,
                    parameters: {
                        depthTest: false,
                        blend: true,
                        blendFunc: [770, 1],
                        blendEquation: 32774,
                    },
                    onHover: (info) => {
                        if (window.matchMedia("(hover: none)").matches) return;
                        showTooltip(info);
                    },
                    onClick: (info) => {
                        if (!window.matchMedia("(hover: none)").matches) return;
                        showTooltip(info);
                    },
                });
            }

            function refreshLayer() {
                if (!overlay) return;
                overlay.setProps({ layers: [buildLayer()] });
                displayTotal = Object.values(cantonData)
                    .flat()
                    .filter((d) => activeCantons.has(d.canton))
                    .reduce((s, p) => s + p.companies.length, 0);
                document.getElementById("legend-subtitle").textContent =
                    TRANSLATIONS[currentLang].legendSubtitle + " (" + displayTotal.toLocaleString() + ")";
                updateLegendCounts();
            }

            // ── Boot ───────────────────────────────────────────────────────────────
            loadBsData().then((points) => {
                cantonData["BS"] = points;
                displayTotal = points.reduce((s, p) => s + p.companies.length, 0);
                document.getElementById("legend-subtitle").textContent =
                    TRANSLATIONS[currentLang].legendSubtitle + " (" + displayTotal.toLocaleString() + ")";

                // Build canton list
                const cantonEl = document.getElementById("canton-items");
                const cantonCounts = {
                    AG: 28367,
                    AI: 2102,
                    AR: 5773,
                    BE: 41612,
                    BL: 11819,
                    BS: 18850,
                    FR: 13730,
                    GE: 16819,
                    GL: 3610,
                    GR: 11369,
                    JU: 6425,
                    LU: 17558,
                    NE: 13160,
                    NW: 5607,
                    OW: 4291,
                    SG: 24092,
                    SH: 6413,
                    SO: 11558,
                    SZ: 8907,
                    TG: 14130,
                    TI: 15901,
                    UR: 2376,
                    VD: 31789,
                    VS: 18290,
                    ZG: 6973,
                    ZH: 64837,
                };
                CANTONS.forEach((canton) => {
                    const isActive = activeCantons.has(canton.id);
                    const cnt = cantonCounts[canton.id] || 0;
                    const div = document.createElement("div");
                    div.className =
                        "canton-item " + (isActive ? "active" : "inactive");
                    div.dataset.id = canton.id;
                    div.innerHTML = `
          <span class="canton-badge">${canton.id}</span>
          <span class="canton-name">${canton.name}</span>
          <span class="canton-count">${cnt > 0 ? "(" + cnt.toLocaleString() + ")" : ""}</span>`;
                    cantonEl.appendChild(div);

                    div.addEventListener("click", async () => {
                        if (activeCantons.has(canton.id)) {
                            activeCantons.delete(canton.id);
                            div.classList.remove("active");
                            div.classList.add("inactive");
                        } else {
                            activeCantons.add(canton.id);
                            div.classList.add("active");
                            div.classList.remove("inactive");
                            await loadCantonData(canton);
                        }
                        refreshLayer();
                    });
                });

                // Map — MapLibre + CartoDB Dark Matter (OSM, no token required)
                map = new maplibregl.Map({
                    container: "map",
                    style: {
                        version: 8,
                        sources: {
                            "carto-dark": {
                                type: "raster",
                                tiles: [
                                    "https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png",
                                    "https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png",
                                    "https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png",
                                ],
                                tileSize: 256,
                                attribution:
                                    "© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> © <a href='https://carto.com/attributions'>CARTO</a>",
                            },
                        },
                        layers: [
                            {
                                id: "background",
                                type: "background",
                                paint: { "background-color": "#0b0f1a" },
                            },
                            {
                                id: "carto-dark",
                                type: "raster",
                                source: "carto-dark",
                                paint: {
                                    "raster-brightness-min": 0.07,
                                    "raster-hue-rotate": 210,
                                    "raster-saturation": 0.4,
                                    "raster-contrast": -0.1,
                                    "raster-fade-duration": 0,
                                },
                            },
                        ],
                    },
                    center: [7.58, 47.56],
                    zoom: 12,
                    minZoom: 6,
                    maxZoom: 16,
                    pitch: 0,
                    bearing: 0,
                    antialias: true,
                    dragRotate: true,
                });

                overlay = new deck.MapboxOverlay({ layers: [buildLayer()] });

                map.on("load", async () => {
                    map.addControl(overlay);
                    map.addControl(
                        new maplibregl.NavigationControl({
                            visualizePitch: true,
                        }),
                        "bottom-right",
                    );

                    map.flyTo({
                        center: [BERN.lng, BERN.lat],
                        zoom: 11,
                        duration: 1500,
                    });

                    activeCantons.add("BE");
                    const el = document.querySelector('.canton-item[data-id="BE"]');
                    if (el) {
                        el.classList.add("active");
                        el.classList.remove("inactive");
                    }
                    await loadCantonData(CANTONS.find((c) => c.id === "BE"));
                    refreshLayer();
                });

                map.on("zoom", () => {
                    if (nightView) {
                        document.getElementById("night-intensity").value =
                            effectiveIntensity();
                        refreshLayer();
                    }
                });

                document
                    .getElementById("tooltip-close")
                    .addEventListener("click", () => {
                        document.getElementById("tooltip").style.display =
                            "none";
                    });

                // ── Legend toggles ─────────────────────────────────────────────────
                document
                    .getElementById("legend-items")
                    .addEventListener("click", (e) => {
                        const item = e.target.closest(".legend-item");
                        if (!item) return;
                        const lbl = item.dataset.label;
                        if (activeLabels.has(lbl)) {
                            activeLabels.delete(lbl);
                            item.classList.add("inactive");
                        } else {
                            activeLabels.add(lbl);
                            item.classList.remove("inactive");
                        }
                        refreshLayer();
                    });

                document
                    .getElementById("btn-select-all")
                    .addEventListener("click", () => {
                        colorAssignments.forEach((a) =>
                            activeLabels.add(a.label),
                        );
                        document
                            .querySelectorAll(".legend-item")
                            .forEach((el) => el.classList.remove("inactive"));
                        refreshLayer();
                    });

                document
                    .getElementById("btn-deselect-all")
                    .addEventListener("click", () => {
                        activeLabels.clear();
                        document
                            .querySelectorAll(".legend-item")
                            .forEach((el) => el.classList.add("inactive"));
                        refreshLayer();
                    });

                document
                    .getElementById("btn-night-view")
                    .addEventListener("click", () => {
                        nightView = !nightView;
                        document
                            .getElementById("btn-night-view")
                            .classList.toggle("active", nightView);
                        document
                            .getElementById("night-intensity-row")
                            .classList.toggle("visible", nightView);
                        refreshLayer();
                    });

                document
                    .getElementById("night-intensity")
                    .addEventListener("input", (e) => {
                        anchorIntensity = +e.target.value;
                        anchorZoom = map.getZoom();
                        refreshLayer();
                    });

                // ── Canton all / none ──────────────────────────────────────────────
                document
                    .getElementById("btn-canton-all")
                    .addEventListener("click", async () => {
                        await Promise.all(
                            CANTONS.map((c) => loadCantonData(c)),
                        );
                        CANTONS.forEach((c) => activeCantons.add(c.id));
                        document
                            .querySelectorAll(".canton-item")
                            .forEach((el) => {
                                el.classList.add("active");
                                el.classList.remove("inactive");
                            });
                        refreshLayer();
                    });

                document
                    .getElementById("btn-canton-none")
                    .addEventListener("click", () => {
                        activeCantons.clear();
                        document
                            .querySelectorAll(".canton-item")
                            .forEach((el) => {
                                el.classList.remove("active");
                                el.classList.add("inactive");
                            });
                        refreshLayer();
                    });
            });

            // ── Tooltip helper (shared by hover + tap) ─────────────────────────────
            function showTooltip(info) {
                const tt = document.getElementById("tooltip");
                if (!info.object) {
                    tt.style.display = "none";
                    return;
                }

                const list = info.object.companies.filter((c) =>
                    activeLabels.has(c.label),
                );
                const MAX = 10;
                const rows = list
                    .slice(0, MAX)
                    .map((c) => {
                        const hex =
                            colorAssignments.find((a) => a.label === c.label)
                                ?.hex ?? "#888";
                        return `
        <div style="border-top:1px solid rgba(255,255,255,0.06);margin-top:8px;padding-top:8px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:${hex}"></span>
            <span style="color:#fff;font-weight:500;font-size:13px">${c.name}</span>
          </div>
          <div style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:3px">${c.rechtsform}</div>
          <div style="color:rgba(255,255,255,0.3);font-size:11px">${c.address}</div>
        </div>`;
                    })
                    .join("");
                const more =
                    list.length > MAX
                        ? `<div style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:8px">+${list.length - MAX} more</div>`
                        : "";

                tt.style.display = "block";
                tt.style.left =
                    Math.min(info.x + 15, window.innerWidth - 340) + "px";
                tt.style.top =
                    Math.min(info.y + 15, window.innerHeight - 220) + "px";
                document.getElementById("tooltip-content").innerHTML = `
        <div style="color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:.05em;text-transform:uppercase">
          ${list.length} ${list.length === 1 ? "company" : "companies"} · ${info.object.canton}
        </div>
        ${rows}${more}`;
            }

            // ── Panel toggles (mobile) ─────────────────────────────────────────────
            document
                .getElementById("toggle-canton")
                .addEventListener("click", () => {
                    document
                        .getElementById("canton-panel")
                        .classList.toggle("open");
                    document.getElementById("legend").classList.remove("open");
                });
            document
                .getElementById("toggle-legend")
                .addEventListener("click", () => {
                    document.getElementById("legend").classList.toggle("open");
                    document
                        .getElementById("canton-panel")
                        .classList.remove("open");
                });

            // Click on map closes panels
            document.getElementById("map").addEventListener("click", (e) => {
                if (e.target.id === "map" || e.target.classList.contains("maplibregl-canvas")) {
                    document.getElementById("canton-panel").classList.remove("open");
                    document.getElementById("legend").classList.remove("open");
                }
            });
        </script>
    </body>
</html>
