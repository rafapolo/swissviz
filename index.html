<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwissViz</title>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script src="https://unpkg.com/deck.gl@9.0.0/dist.min.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
    .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { opacity: 0.3; }
    .mapboxgl-ctrl-group { background: rgb(16, 23, 41) !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 6px !important; }
    .mapboxgl-ctrl-group button { background-color: transparent !important; border-color: rgba(255,255,255,0.08) !important; }
    .mapboxgl-ctrl-group button:hover { background-color: rgba(255,255,255,0.08) !important; }
    .mapboxgl-ctrl-icon { filter: invert(0.8); }
    @media (max-width: 600px) { .mapboxgl-ctrl-group { display: none; } }
    #map { width: 100vw; height: 100vh; position: relative; z-index: 0; }
    .panel { z-index: 10; }
    #tooltip { z-index: 11; }

    #tooltip {
      display: none;
      position: fixed;
      background: rgba(16, 23, 41, 0.96);
      border: 1px solid rgba(108, 142, 255, 0.25);
      border-radius: 8px;
      padding: 12px 16px;
      max-width: 300px;
      pointer-events: none;
    }
    #tooltip-close {
      position: absolute; top: 6px; right: 8px;
      background: none; border: none; color: rgba(255,255,255,0.4);
      font-size: 14px; cursor: pointer; pointer-events: all; line-height: 1;
    }
    #tooltip-close:hover { color: rgba(255,255,255,0.8); }

    .panel {
      position: fixed;
      background: rgba(16, 23, 41, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    .panel::-webkit-scrollbar { width: 3px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    @media (max-width: 600px) {
      .panel::-webkit-scrollbar { width: 4px; }
      .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
    }
    .panel-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .panel-dot { width: 6px; height: 6px; background: #6c8eff; border-radius: 50%; box-shadow: 0 0 6px #6c8eff; }
    .panel-header h2 { color: rgba(255,255,255,0.9); font-size: 12px; font-weight: 500; letter-spacing: 0.02em; }
    .panel-subtitle { color: rgba(255,255,255,0.3); font-size: 10px; margin-bottom: 10px; padding-left: 12px; }

    .legend-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 4px; margin: 2px 0;
      border-radius: 5px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      min-width: 160px;
    }
    .legend-item:hover, .legend-item:active { opacity: 0.8; }
    .legend-item.inactive { opacity: 0.3; }
    .legend-item.inactive .legend-color { filter: grayscale(1); }
    .legend-color { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: filter 0.15s; }
    .legend-label { color: rgba(255,255,255,0.65); font-size: 13px; flex: 1; }
    .legend-count { color: rgba(255,255,255,0.25); font-size: 11px; }

    #canton-panel { top: 20px; left: 20px; min-width: 190px; }
    #legend { top: 20px; right: 20px; min-width: 160px; }

    .canton-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 4px; margin: 2px 0;
      border-radius: 5px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .canton-item:hover { background: rgba(255,255,255,0.05); }
    .canton-item.active { background: rgba(255,255,255,0.06); }
    .canton-badge {
      font-size: 10px; padding: 2px 6px;
      border-radius: 4px; flex-shrink: 0;
      font-weight: 600; letter-spacing: 0.03em;
      transition: background 0.15s, color 0.15s;
    }
    .canton-item.active .canton-badge { background: rgba(108,142,255,0.2); color: #6c8eff; }
    .canton-name { color: rgba(255,255,255,0.6); font-size: 13px; flex: 1; }
    .canton-count { color: rgba(255,255,255,0.2); font-size: 11px; }

    .canton-loader {
      display: inline-block; width: 10px; height: 10px;
      border: 1.5px solid rgba(108,142,255,0.3);
      border-top-color: #6c8eff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 4px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .panel-toggle {
      display: none; align-items: center; justify-content: center;
      position: fixed; width: 44px; height: 44px;
      background: rgba(16,23,41,0.9); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
      color: rgba(255,255,255,0.7); font-size: 18px; cursor: pointer; z-index: 9;
    }
    #toggle-canton { top: 20px; left: 20px; }
    #toggle-legend { top: 20px; right: 20px; }

    .panel-controls { display: flex; gap: 4px; margin-top: 10px; }
    .panel-controls button {
      flex: 1; padding: 5px 4px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 5px; color: rgba(255,255,255,0.5); font-size: 10px;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .panel-controls button:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }

    #title {
      position: fixed; bottom: 20px; left: 20px; z-index: 8;
      background: rgba(16,23,41,0.8); backdrop-filter: blur(8px);
      padding: 8px 12px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    #title h1 { color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 500; letter-spacing: 0.05em; }

    #btn-geo-me {
      display: none; width: 100%; margin: 6px 0;
      background: rgba(108,142,255,0.15); border: 1px solid rgba(108,142,255,0.3);
      border-radius: 6px; color: #6c8eff; font-family: inherit;
      font-size: 12px; padding: 8px; cursor: pointer; letter-spacing: .03em;
    }

    @media (max-width: 600px) {
      .panel-toggle { display: flex; }
      .panel { display: none; }
      .panel.open { display: block; }
      #canton-panel { top: auto; bottom: 0; left: 0; right: 0; width: 100%; max-width: 100%; max-height: 70vh; border-radius: 16px 16px 0 0; padding: 16px 16px 24px; }
      #legend { top: auto; bottom: 0; left: 0; right: 0; width: 100%; max-width: 100%; max-height: 70vh; border-radius: 16px 16px 0 0; padding: 16px 16px 24px; }
      .canton-item { margin: 6px 0; padding: 8px 6px; font-size: 13px; border-radius: 8px; }
      .canton-badge { font-size: 11px; padding: 3px 7px; }
      .canton-name { font-size: 15px; }
      .canton-count { font-size: 12px; }
      .legend-item { margin: 5px 0; padding: 8px 6px; border-radius: 8px; }
      .legend-label { font-size: 14px; }
      .legend-count { font-size: 12px; }
      .panel-controls button { font-size: 12px; padding: 10px 4px; }
      #toggle-canton { top: auto; bottom: 20px; left: 20px; }
      #toggle-legend { top: auto; bottom: 20px; right: 20px; }
      #tooltip { max-width: calc(100vw - 40px); }
      #tooltip-close { display: block; }
      #title { bottom: 80px; left: 16px; }
      #title h1 { font-size: 16px; }
    }
    @media (max-width: 400px) {
      #canton-panel, #legend { max-height: 60vh; }
      #toggle-canton { bottom: 14px; left: 14px; width: 42px; height: 42px; }
      #toggle-legend { bottom: 14px; right: 14px; width: 42px; height: 42px; }
      #title { bottom: 70px; left: 14px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <button class="panel-toggle" id="toggle-canton" onclick="document.getElementById('canton-panel').classList.toggle('open'); document.getElementById('legend').classList.remove('open');">☰</button>
  <button class="panel-toggle" id="toggle-legend" onclick="document.getElementById('legend').classList.toggle('open'); document.getElementById('canton-panel').classList.remove('open');">◑</button>

  <div id="canton-panel" class="panel">
    <div class="panel-header"><div class="panel-dot"></div><h2>Cantons</h2></div>
    <div class="panel-subtitle">Select regions</div>
    <div id="canton-items"></div>
    <button id="btn-geo-me">📍 Nearest canton</button>
    <div class="panel-controls">
      <button id="btn-canton-all">Select all</button>
      <button id="btn-canton-none">Deselect all</button>
    </div>
  </div>

  <div id="legend" class="panel">
    <div class="panel-header"><div class="panel-dot"></div><h2>Legend</h2></div>
    <div id="legend-items"></div>
  </div>

  <div id="title"><h1>Swiss Companies</h1></div>
  <div id="tooltip"></div>

  <script>
    const CANTONS = [
      { id:'AG', name:'Aargau',       color:'#4285F4' },
      { id:'AI', name:'Appenzell I.','color':'#34A853' },
      { id:'AR', name:'Appenzell A.','color':'#FBBC05' },
      { id:'BE', name:'Bern',         color:'#EA4335' },
      { id:'BL', name:'Basel-Landschaft','color':'#FF6D01' },
      { id:'BS', name:'Basel-Stadt',  color:'#46BDC6' },
      { id:'FR', name:'Fribourg',     color:'#7B1FA2' },
      { id:'GE', name:'Genève',       color:'#E91E63' },
      { id:'GL', name:'Glarus',       color:'#00BCD4' },
      { id:'GR', name:'Graubünden',   color:'#9C27B0' },
      { id:'JU', name:'Jura',         color:'#FF5722' },
      { id:'LU', name:'Luzern',       color:'#8BC34A' },
      { id:'NE', name:'Neuchâtel',    color:'#009688' },
      { id:'NW', name:'Nidwalden',    color:'#3F51B5' },
      { id:'OW', name:'Obwalden',     color:'#CDDC39' },
      { id:'SG', name:'St. Gallen',   color:'#03A9F4' },
      { id:'SH', name:'Schaffhausen', color:'#F44336' },
      { id:'SO', name:'Solothurn',    color:'#009688' },
      { id:'SZ', name:'Schwyz',       color:'#FF9800' },
      { id:'TG', name:'Thurgau',      color:'#795548' },
      { id:'TI', name:'Ticino',       color:'#9C27B0' },
      { id:'UR', name:'Uri',          color:'#673AB7' },
      { id:'VD', name:'Vaud',         color:'#F44336' },
      { id:'VS', name:'Valais',       color:'#3F51B5' },
      { id:'ZG', name:'Zug',          color:'#E91E63' },
      { id:'ZH', name:'Zürich',       color:'#FF5722' },
    ];

    const activeCantons = new Set(['BS']);
    const cantonData = {};
    const cantonLoading = new Set();
    let overlay = null;
    const isTouchDevice = window.matchMedia('(hover: none)').matches;

    async function loadCantonData(canton) {
      if (cantonData[canton.id] || cantonLoading.has(canton.id)) return;
      cantonLoading.add(canton.id);
      setCantonLoading(canton.id, true);
      try {
        const res = await fetch(`data/${canton.id}.json`);
        const meta = await res.json();
        const chunks = meta._chunks;
        let rows = [];
        if (chunks) {
          const fetches = [];
          for (let i = 0; i < chunks; i++) {
            fetches.push(fetch(`data/${canton.id}_${i}.json.gz`).then(r => r.json()));
          }
          const results = await Promise.all(fetches);
          results.forEach(r => rows.push(...r));
        } else if (meta.chunks && meta.chunks.length === 1) {
          rows = await fetch(`data/${meta.chunks[0]}`).then(r => r.json());
        }
        cantonData[canton.id] = rows;
        refreshLayer();
        buildLegendUI();
      } catch (e) {
        console.error('Failed to load canton', canton.id, e);
      } finally {
        cantonLoading.delete(canton.id);
        setCantonLoading(canton.id, false);
      }
    }

    function setCantonLoading(id, loading) {
      const el = document.querySelector(`.canton-item[data-id="${id}"] .canton-count`);
      if (!el) return;
      if (loading) {
        el.innerHTML = '<span class="canton-loader"></span>';
      } else {
        const count = cantonData[id] ? cantonData[id].length : 0;
        el.textContent = count ? count.toLocaleString() : '';
      }
    }

    function buildCantonUI() {
      const el = document.getElementById('canton-items');
      el.innerHTML = '';
      CANTONS.forEach(c => {
        const div = document.createElement('div');
        div.className = 'canton-item' + (activeCantons.has(c.id) ? ' active' : '');
        div.dataset.id = c.id;
        div.innerHTML = `
          <span class="canton-badge" style="background:${c.color}22;color:${c.color}">${c.id}</span>
          <span class="canton-name">${c.name}</span>
          <span class="canton-count"></span>
        `;
        div.addEventListener('click', () => {
          if (activeCantons.has(c.id)) {
            activeCantons.delete(c.id);
            div.classList.remove('active');
          } else {
            activeCantons.add(c.id);
            div.classList.add('active');
            if (!cantonData[c.id]) loadCantonData(c);
          }
          refreshLayer();
        });
        el.appendChild(div);
      });
    }

    function buildLegendUI() {
      const el = document.getElementById('legend-items');
      el.innerHTML = '';
      CANTONS.forEach(c => {
        const count = cantonData[c.id] ? cantonData[c.id].length : 0;
        const div = document.createElement('div');
        div.className = 'legend-item' + (activeCantons.has(c.id) ? '' : ' inactive');
        div.dataset.id = c.id;
        div.innerHTML = `
          <span class="legend-color" style="background:${c.color}"></span>
          <span class="legend-label">${c.name}</span>
          <span class="legend-count">${count ? count.toLocaleString() : ''}</span>
        `;
        div.addEventListener('click', () => {
          const item = document.querySelector(`.canton-item[data-id="${c.id}"]`);
          if (item) item.click();
        });
        el.appendChild(div);
      });
    }

    function refreshLayer() {
      if (!overlay) return;
      const allPoints = [];
      CANTONS.forEach(c => {
        if (activeCantons.has(c.id) && cantonData[c.id]) {
          cantonData[c.id].forEach(p => allPoints.push({ ...p, canton: c.id, color: c.color }));
        }
      });
      overlay.setProps({
        layers: [
          new deck.ScatterplotLayer({
            id: 'companies',
            data: allPoints,
            getPosition: d => [d.lng, d.lat],
            getRadius: 18,
            radiusMinPixels: 1,
            radiusMaxPixels: 3,
            pickable: true,
            opacity: 0.8,
            stroked: false,
            parameters: { depthTest: false, blend: true, blendFunc: [770, 1], blendEquation: 32774 },
            onHover: info => { if (!isTouchDevice) showTooltip(info); },
            onClick: info => { if (isTouchDevice) showTooltip(info); }
          })
        ]
      });
    }

    function init() {
      mapboxgl.accessToken = window.MAPBOX_TOKEN || 'YOUR_MAPBOX_TOKEN_HERE';
      const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [7.58, 47.56],
        zoom: 12, pitch: 0, bearing: 0, antialias: true, dragRotate: true
      });

      overlay = new deck.MapboxOverlay({ interleaved: true, layers: [] });

      map.on('load', () => {
        map.addControl(overlay);
        map.addControl(new mapboxgl.NavigationControl({ showCompass: true }), 'bottom-right');
        buildCantonUI();
        buildLegendUI();
        loadCantonData(CANTONS.find(c => c.id === 'BS'));
      });

      document.getElementById('btn-canton-all').addEventListener('click', async () => {
        await Promise.all(CANTONS.map(c => loadCantonData(c)));
        CANTONS.forEach(c => {
          activeCantons.add(c.id);
          const el = document.querySelector(`.canton-item[data-id="${c.id}"]`);
          if (el) el.classList.add('active');
        });
        refreshLayer();
      });

      document.getElementById('btn-canton-none').addEventListener('click', () => {
        activeCantons.clear();
        document.querySelectorAll('.canton-item').forEach(el => el.classList.remove('active'));
        refreshLayer();
      });

      if (isTouchDevice && navigator.geolocation) {
        const geoBtn = document.getElementById('btn-geo-me');
        geoBtn.style.display = 'block';
        geoBtn.addEventListener('click', () => {
          geoBtn.textContent = 'Locating…';
          navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng } = pos.coords;
            map.flyTo({ center: [lng, lat], zoom: 11, pitch: 30, bearing: 0, duration: 1500 });
            geoBtn.textContent = '📍 Done';
            setTimeout(() => { geoBtn.textContent = '📍 Nearest canton'; }, 3000);
          }, () => {
            geoBtn.textContent = 'Location unavailable';
            setTimeout(() => { geoBtn.textContent = '📍 Nearest canton'; }, 2000);
          }, { timeout: 10000 });
        });
      }
    }

    function showTooltip(info) {
      const tt = document.getElementById('tooltip');
      if (!info.object) { tt.style.display = 'none'; return; }
      tt.style.display = 'block';
      const tooltipW = Math.min(300, window.innerWidth - 20);
      const tooltipH = 200;
      tt.style.maxWidth = tooltipW + 'px';
      tt.style.left = Math.min(Math.max(info.x + 15, 10), window.innerWidth - tooltipW - 10) + 'px';
      tt.style.top = Math.min(Math.max(info.y + 15, 10), window.innerHeight - tooltipH - 10) + 'px';
      const d = info.object;
      tt.innerHTML = `
        <button id="tooltip-close" onclick="this.parentElement.style.display='none'">✕</button>
        <div style="color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:.05em;text-transform:uppercase">${info.object.canton}</div>
        <div style="color:rgba(255,255,255,0.9);font-size:13px;margin:4px 0 2px;word-break:break-word">${d.n || 'Unknown'}</div>
        ${d.t ? `<div style="color:rgba(255,255,255,0.45);font-size:11px">${d.t}</div>` : ''}
        ${d.m ? `<div style="color:rgba(255,255,255,0.3);font-size:10px">${d.m}</div>` : ''}
        <div style="color:rgba(255,255,255,0.2);font-size:10px;margin-top:4px">${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}</div>
      `;
    }

    document.getElementById('map').addEventListener('click', e => {
      if (!isTouchDevice) return;
      if (!e.target.closest('.panel')) {
        document.getElementById('canton-panel').classList.remove('open');
        document.getElementById('legend').classList.remove('open');
        document.getElementById('tooltip').style.display = 'none';
      }
    });

    init();
  </script>
</body>
</html>
