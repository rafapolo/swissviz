<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>SwissViz — Swiss Companies Map</title>
        <meta name="description" content="Interactive map of 750k+ Swiss companies visualised by location, canton, and legal form. Built with open data from opendata.swiss." />
        <meta name="author" content="ExtraPolo.com" />
        <meta property="og:title" content="SwissViz — Swiss Companies Map" />
        <meta property="og:description" content="Interactive map of 750k+ Swiss companies visualised by location, canton, and legal form. Built with open data from opendata.swiss." />
        <meta property="og:image" content="https://rafapolo.github.io/swissviz/mini.jpg" />
        <meta property="og:url" content="https://rafapolo.github.io/swissviz/" />
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="SwissViz" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:image" content="https://rafapolo.github.io/swissviz/mini.jpg" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇨🇭</text></svg>"
        />
        <link rel="preload" href="data/BS_0.json.gz" as="fetch" crossorigin />
        <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap");
            :root {
                --bg: rgb(16, 23, 41);
                --accent: #6c8eff;
                --border: rgba(255, 255, 255, 0.07);
                --border-subtle: rgba(255, 255, 255, 0.06);
                --border-mid: rgba(255, 255, 255, 0.1);
                --surface: rgba(255, 255, 255, 0.06);
                --white-dim: rgba(255, 255, 255, 0.08);
                --white-muted: rgba(255, 255, 255, 0.5);
                --white-soft: rgba(255, 255, 255, 0.6);
                --shadow-dark: rgba(0, 0, 0, 0.6);
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                background: var(--bg);
                color: #fff;
                overflow: hidden;
            }
            .maplibregl-ctrl-logo,
            .maplibregl-ctrl-attrib {
                opacity: 0.3;
            }
            #map {
                width: 100vw;
                height: 100vh;
                position: relative;
                z-index: 0;
                outline: none;
            }
            #map:focus,
            #map canvas:focus,
            #map canvas {
                outline: none;
            }
            /* Visible focus styles for keyboard navigation */
            :focus-visible {
                outline: 2px solid rgba(108, 142, 255, 0.8);
                outline-offset: 2px;
            }
            button:focus-visible,
            .lang-btn:focus-visible {
                outline: 2px solid rgba(108, 142, 255, 0.8);
                outline-offset: 2px;
                border-radius: 3px;
            }
            .legend-item:focus-visible,
            .canton-item:focus-visible {
                outline: 2px solid rgba(108, 142, 255, 0.8);
                outline-offset: 1px;
                background: rgba(255, 255, 255, 0.06);
            }
            /* Tooltip */
            #tooltip {
                z-index: 13;
                position: absolute;
                padding: 14px 16px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                font-size: 14px;
                pointer-events: none;
                display: none;
                max-width: 320px;
                box-shadow: 0 8px 32px var(--shadow-dark);
            }
            #tooltip h3 {
                color: #fff;
                margin-bottom: 6px;
                font-size: 14px;
                font-weight: 500;
                line-height: 1.3;
            }
            #tooltip p {
                margin: 3px 0;
                color: rgba(255, 255, 255, 0.6);
                font-size: 12px;
            }
            #tooltip span {
                color: rgba(255, 255, 255, 0.75);
            }

            /* Shared panel */
            .panel {
                z-index: 12;
                opacity: 0.97;
                position: absolute;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 14px 16px;
                font-size: 14px;
                overflow-y: auto;
                max-height: calc(100vh - 40px);
            }
            .panel::-webkit-scrollbar {
                width: 3px;
            }
            .panel::-webkit-scrollbar-track {
                background: transparent;
            }
            .panel::-webkit-scrollbar-thumb {
                background: var(--border-mid);
                border-radius: 3px;
            }
            .panel-header {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 4px;
            }
            .panel-dot {
                color: var(--accent);
                font-size: 14px;
                line-height: 1;
                padding-bottom: 3px;
            }
            .panel-header h2 {
                color: rgba(255, 255, 255, 0.9);
                font-size: 14px;
                font-weight: 500;
                letter-spacing: 0.02em;
            }
            .lang-switcher {
                display: flex;
                gap: 2px;
                margin-left: auto;
            }
            .lang-btn {
                background: var(--surface);
                border: 1px solid var(--border-mid);
                border-radius: 3px;
                color: rgba(255, 255, 255, 0.65);
                font-family: inherit;
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.05em;
                padding: 2px 5px;
                cursor: pointer;
                transition:
                    background 0.15s,
                    color 0.15s,
                    border-color 0.15s;
                line-height: 1.4;
            }
            .lang-btn:hover {
                background: var(--border-mid);
                color: rgba(255, 255, 255, 0.7);
            }
            .lang-btn.active {
                background: rgba(108, 142, 255, 0.15);
                border-color: rgba(108, 142, 255, 0.4);
                color: var(--accent);
            }
            .panel-subtitle {
                color: rgba(255, 255, 255, 0.55);
                font-size: 11px;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                padding-bottom: 10px;
                border-bottom: 1px solid var(--border-subtle);
            }
            .panel-controls {
                display: flex;
                gap: 6px;
                padding: 10px 0;
                border-bottom: 1px solid var(--border-subtle);
                margin-bottom: 10px;
            }
            .panel-controls button {
                flex: 1;
                background: var(--surface);
                border: 1px solid var(--border-mid);
                border-radius: 4px;
                color: rgba(255, 255, 255, 0.75);
                font-family: inherit;
                font-size: 12px;
                padding: 8px 0;
                cursor: pointer;
                transition:
                    background 0.15s,
                    color 0.15s;
                letter-spacing: 0.03em;
            }
            .panel-controls button:hover,
            .panel-controls button:active {
                background: rgba(255, 255, 255, 0.12);
                color: rgba(255, 255, 255, 0.9);
            }
            .panel-controls button.active {
                background: rgba(255, 203, 153, 0.18);
                border-color: rgba(255, 203, 153, 0.5);
                color: rgb(255, 203, 153);
            }
            #night-view-controls {
                border-top: 1px solid var(--border-subtle);
                border-bottom: none;
                margin-bottom: 0;
            }
            #night-intensity-row {
                max-height: 0;
                opacity: 0;
                overflow: hidden;
                padding: 0;
                transition:
                    max-height 0.3s ease,
                    opacity 0.25s ease,
                    padding 0.3s ease;
            }
            #night-intensity-row.visible {
                max-height: 60px;
                opacity: 1;
                padding: 10px 0 14px;
            }
            #night-intensity-row input[type="range"] {
                width: 100%;
                accent-color: rgba(255, 197, 143, 0.9);
                cursor: pointer;
            }

            /* Legend — right */
            #legend {
                top: 20px;
                right: 20px;
                min-width: 285px;
                padding: 14px 16px;
            }
            .legend-item {
                display: flex;
                align-items: center;
                margin: 4px 0;
                gap: 8px;
                cursor: pointer;
                user-select: none;
                transition: opacity 0.15s;
                padding: 4px;
                border-radius: 4px;
            }
            .legend-item:hover,
            .legend-item:active {
                opacity: 0.8;
            }
            .legend-item.inactive {
                opacity: 0.3;
            }
            .legend-item.inactive .legend-color {
                filter: grayscale(1);
            }
            .legend-color {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                flex-shrink: 0;
                transition: filter 0.15s;
            }
            .legend-label {
                color: rgba(255, 255, 255, 0.65);
                font-size: 13px;
                flex: 1;
            }
            .legend-count {
                color: var(--white-muted);
                font-size: 12px;
            }

            /* Canton panel — left */
            #canton-panel {
                top: 20px;
                left: 20px;
                min-width: 285px;
                max-height: calc(100vh - 40px);
            }
            .canton-item {
                display: flex;
                align-items: center;
                margin: 4px 0;
                gap: 8px;
                cursor: pointer;
                user-select: none;
                transition: opacity 0.15s;
                padding: 4px;
                border-radius: 4px;
            }
            .canton-item:hover,
            .canton-item:active {
                background: rgba(255, 255, 255, 0.04);
            }
            .canton-item.inactive {
                opacity: 0.35;
            }
            .canton-badge {
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.05em;
                background: var(--white-dim);
                border-radius: 3px;
                padding: 3px 6px;
                color: var(--white-soft);
                min-width: 30px;
                text-align: center;
                transition:
                    background 0.15s,
                    color 0.15s;
            }
            .canton-item.active .canton-badge {
                background: rgba(108, 142, 255, 0.2);
                color: var(--accent);
            }
            .canton-name {
                color: var(--white-soft);
                font-size: 13px;
                flex: 1;
            }
            .canton-count {
                color: rgba(255, 255, 255, 0.5);
                font-size: 12px;
            }

            /* Panel collapse toggle (corner — expand trigger, hidden under open panel) */
            .panel-toggle {
                display: flex;
                position: absolute;
                width: 44px;
                height: 44px;
                background: var(--bg);
                border: 1px solid var(--border-mid);
                border-radius: 8px;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                z-index: 11;
                font-size: 16px;
                color: #fff;
            }

            /* In-panel collapse arrow (desktop only) */
            .panel-arrow {
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.5);
                cursor: pointer;
                font-size: 18px;
                padding: 0 2px;
                line-height: 1;
                transition: color 0.15s;
                flex-shrink: 0;
            }
            .panel-arrow:hover {
                color: rgba(255, 255, 255, 0.55);
            }
            #collapse-canton {
                margin-left: auto;
            }
            @media (max-width: 980px) {
                .panel-arrow { display: none; }
            }
            #toggle-canton {
                top: 20px;
                left: 20px;
            }
            #toggle-legend {
                top: 20px;
                right: 20px;
            }

            /* Tooltip close button (mobile) */
            #tooltip-close {
                display: none;
                position: absolute;
                top: 8px;
                right: 10px;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                font-size: 18px;
                cursor: pointer;
                padding: 4px;
                line-height: 1;
            }

            #title {
                z-index: 10;
            }

            @media (min-width: 981px) {
                .panel {
                    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
                }
                #canton-panel.collapsed {
                    transform: translateX(calc(-100% - 20px));
                }
                #legend.collapsed {
                    transform: translateX(calc(100% + 20px));
                }
            }
            @media (max-width: 980px) {
                /* Panels become full-width bottom sheets */
                .panel {
                    position: fixed !important;
                    top: auto !important;
                    left: 0 !important;
                    right: 0 !important;
                    bottom: 0 !important;
                    width: 100% !important;
                    max-height: 75vh;
                    min-width: unset;
                    border-radius: 16px 16px 0 0;
                    border-left: none;
                    border-right: none;
                    border-bottom: none;
                    transform: translateY(100%);
                    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
                    overflow-y: auto;
                    display: block;
                    /* drag handle */
                    padding-top: 20px;
                }
                .panel::before {
                    content: "";
                    display: block;
                    width: 36px;
                    height: 4px;
                    background: rgba(255, 255, 255, 0.15);
                    border-radius: 2px;
                    margin: -12px auto 12px;
                }
                .panel.open {
                    transform: translateY(0);
                }
                #tooltip {
                    max-width: calc(100vw - 20px);
                    left: 10px !important;
                    right: 10px;
                }
                #tooltip-close {
                    display: block;
                }
                .maplibregl-ctrl-bottom-right {
                    bottom: 16px !important;
                    right: 16px !important;
                }
            }
            .maplibregl-ctrl-attrib,
            .maplibregl-ctrl-attrib-inner,
            .maplibregl-ctrl-compass,
            .maplibregl-ctrl-group {
                display: none !important;
            }

            /* Loading spinner */
            #loading-screen {
                position: fixed;
                inset: 0;
                z-index: 100;
                background: var(--bg);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                transition: opacity 0.4s ease;
            }
            #loading-screen.hidden {
                opacity: 0;
                pointer-events: none;
            }
            .spinner {
                width: 36px;
                height: 36px;
                border: 2px solid var(--white-dim);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.75s linear infinite;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            .loading-label {
                color: rgba(255, 255, 255, 0.6);
                font-size: 12px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
            }

            /* Search bar — center top */
            #search-bar {
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 14;
                width: 400px;
                max-width: calc(100vw - 200px);
            }
            #search-wrapper {
                display: flex;
                align-items: center;
                background: var(--bg);
                border: 1px solid var(--border-mid);
                border-radius: 6px;
                padding: 0 12px;
                gap: 8px;
                height: 40px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
                transition: border-color 0.15s;
            }
            #search-wrapper:focus-within {
                border-color: rgba(108, 142, 255, 0.4);
            }
            #search-icon {
                color: var(--white-muted);
                font-size: 15px;
                flex-shrink: 0;
                line-height: 1;
                user-select: none;
            }
            #search-icon.loading {
                font-size: 0;
                width: 13px;
                height: 13px;
                border: 1.5px solid var(--border-mid);
                border-top-color: rgba(255, 255, 255, 0.45);
                border-radius: 50%;
                animation: spin 0.75s linear infinite;
                flex-shrink: 0;
            }
            #search-input {
                flex: 1;
                background: none;
                border: none;
                outline: none;
                color: #fff;
                font-family: inherit;
                font-size: 13px;
                letter-spacing: 0.02em;
                min-width: 0;
            }
            #search-input::placeholder {
                color: rgba(255, 255, 255, 0.22);
            }
            #search-input:placeholder-shown {
                text-align: center;
            }
            #search-clear {
                background: none;
                border: none;
                color: var(--white-muted);
                cursor: pointer;
                font-size: 12px;
                padding: 2px;
                display: none;
                line-height: 1;
                flex-shrink: 0;
            }
            #search-clear:hover {
                color: var(--white-soft);
            }
            #search-count {
                color: rgba(255, 255, 255, 0.55);
                font-size: 11px;
                letter-spacing: 0.04em;
                flex-shrink: 0;
                display: none;
            }
            #search-results {
                margin-top: 6px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                display: none;
                box-shadow: 0 8px 32px var(--shadow-dark);
                max-height: 320px;
                overflow-y: auto;
            }
            #search-results::-webkit-scrollbar { width: 3px; }
            #search-results::-webkit-scrollbar-track { background: transparent; }
            #search-results::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
            .search-result-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 0 12px;
                height: 36px;
                box-sizing: border-box;
                cursor: pointer;
                transition: background 0.12s;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                flex-shrink: 0;
            }
            .search-result-item:hover { background: rgba(255, 255, 255, 0.05); }
            .search-result-item.keyboard-active { background: rgba(255, 255, 255, 0.1); }
            .search-result-name {
                color: rgba(255, 255, 255, 0.8);
                font-size: 13px;
                flex: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .search-no-results {
                padding: 12px;
                color: rgba(255, 255, 255, 0.55);
                font-size: 12px;
                text-align: center;
            }
            @media (max-width: 980px) {
                #search-bar {
                    left: 74px;
                    right: 74px;
                    width: auto;
                    max-width: none;
                    transform: none;
                }
            }
            .blink-marker {
                width: 0; height: 0;
                pointer-events: none;
                box-shadow: 0 0 0 6px rgba(255,255,255,0.95), 0 0 0 10px rgba(255,255,255,0.3);
            }
            /* Screen-reader-only utility */
            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border: 0;
            }
        </style>
    </head>
    <body>
        <h1 class="sr-only">SwissViz — Swiss Companies Map</h1>

        <div id="loading-screen" role="status" aria-live="polite" aria-label="Loading map data">
            <div class="spinner" aria-hidden="true"></div>
            <span class="loading-label">Loading</span>
        </div>

        <div
            id="map"
            role="img"
            aria-label="Interactive map of Swiss companies. Use the Canton and Legend panels to filter by region and legal form."
        ></div>

        <div id="sr-status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

        <div id="search-bar" role="search" aria-label="Search Swiss companies">
            <div id="search-wrapper">
                <span id="search-icon" aria-hidden="true">⌕</span>
                <label for="search-input" class="sr-only">Search companies</label>
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search companies…"
                    autocomplete="off"
                    spellcheck="false"
                    aria-autocomplete="list"
                    aria-controls="search-results"
                    aria-haspopup="listbox"
                />
                <span id="search-count" aria-live="polite" aria-atomic="true"></span>
                <button id="search-clear" aria-label="Clear search">✕</button>
            </div>
            <div id="search-results" role="listbox" aria-label="Search results"></div>
        </div>

        <div id="tooltip" role="tooltip" aria-live="polite">
            <button id="tooltip-close" aria-label="Close company details">✕</button>
            <div id="tooltip-content"></div>
        </div>

        <button class="panel-toggle" id="toggle-canton" aria-label="Toggle Cantons panel" aria-expanded="true" aria-controls="canton-panel"><span aria-hidden="true">⌖</span></button>
        <button class="panel-toggle" id="toggle-legend" aria-label="Toggle Legend panel" aria-expanded="true" aria-controls="legend"><span aria-hidden="true">⊟</span></button>

        <div id="canton-panel" class="panel" aria-label="Cantons filter panel">
            <div class="panel-header">
                <span class="panel-dot" aria-hidden="true">⌖</span>
                <h2>Cantons</h2>
                <button class="panel-arrow" id="collapse-canton" aria-label="Collapse Cantons panel"><span aria-hidden="true">‹</span></button>
            </div>
            <div class="panel-subtitle" id="canton-subtitle">Select regions</div>
            <div class="panel-controls">
                <button id="btn-canton-all">Select all</button>
                <button id="btn-canton-none">Deselect all</button>
            </div>
            <div id="canton-items" role="group" aria-labelledby="canton-subtitle"></div>
        </div>

        <div id="legend" class="panel" aria-label="Legend filter panel">
            <div class="panel-header">
                <span class="panel-dot" aria-hidden="true">⊟</span>
                <h2 id="legend-title">Legend</h2>
                <div class="lang-switcher" role="group" aria-label="Language selection">
                    <button class="lang-btn" data-lang="de" aria-label="Switch to German" aria-pressed="false">DE</button>
                    <button class="lang-btn active" data-lang="en" aria-label="Switch to English" aria-pressed="true">EN</button>
                </div>
                <button class="panel-arrow" id="collapse-legend" aria-label="Collapse Legend panel"><span aria-hidden="true">›</span></button>
            </div>
            <div class="panel-subtitle" id="legend-subtitle" aria-live="polite">Legal Form</div>
            <div class="panel-controls">
                <button id="btn-select-all">Select all</button>
                <button id="btn-deselect-all">Deselect all</button>
            </div>
            <div id="legend-items" role="group" aria-labelledby="legend-subtitle"></div>
            <div class="panel-controls" id="night-view-controls">
                <button id="btn-night-view" aria-pressed="false">Night view</button>
            </div>
            <div id="night-intensity-row">
                <label for="night-intensity" class="sr-only">Night view intensity</label>
                <input
                    type="range"
                    id="night-intensity"
                    min="1"
                    max="100"
                    value="50"
                    aria-label="Night view intensity"
                />
            </div>
        </div>



        <script src="https://unpkg.com/deck.gl@9.3.3/dist.min.js"></script>
        <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
        <script>
            // ── URL params ────────────────────────────────────────────────────────
            // ?r=min,max  e.g. ?r=0.5,2  controls radiusMinPixels,radiusMaxPixels
            const _rParam = new URLSearchParams(location.search).get("r");
            const [RADIUS_MIN, RADIUS_MAX] = _rParam
                ? _rParam.split(",").map(Number)
                : [0.5, 2];

            // ── i18n ──────────────────────────────────────────────────────────────
            let currentLang = "en";
            const TRANSLATIONS = {

            function hexToRgb(hex) {
                const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return r
                    ? [

const _cCache=new Map(),_lCache=new Map();
function gc(rf){if(_cCache.has(rf))return _cCache.get(rf);const u=rf.toUpperCase();for(const a of C){if(u.includes(a.rfKey)){const v=h2r(a.hex);_cCache.set(rf,v);return v;}}const f=h2r('#1a1a30');_cCache.set(rf,f);return f;}

function parse(col,canton){const m=new Map(),n=col.n.length;for(let i=0;i<n;i++){const tRaw=col.t[i]||'',rf=(T[tRaw]||tRaw).trim();if(!rf)continue;const lat=col.lat[i],lng=col.lng[i];if(!lat||!lng)continue;const k=Math.round(lat*1e5)*1000000+Math.round(lng*1e5),label=gl(rf),co={name:col.n[i]||'',rechtsform:rf,label,address:'',uid:''};if(!m.has(k))m.set(k,{position:[lng,lat],canton,companies:[],rechtsform:rf,label,color:gc(rf)});m.get(k).companies.push(co);}return[...m.values()];}

            async function gunzipJson(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const ds = new DecompressionStream("gzip");
                const blob = await new Response(
                    res.body.pipeThrough(ds),
                ).blob();
                return JSON.parse(await blob.text());
            }

            async function loadCantonChunk(cantonId, chunk) {
                return gunzipJson(`data/${cantonId}_${chunk}.json.gz`);

                const meta = await fetch(`data/${cantonId}.json`).then((r) =>

                let chunkPromises;
                if (Array.isArray(meta.chunks)) {
                    // Format: { chunks: ["XX_0.json.gz", ...] }
                    chunkPromises = meta.chunks.map((filename) =>
                        gunzipJson(`data/${filename}`),
                    );
                } else {
                    // Format: { _chunks: N }
                    chunkPromises = Array.from(
                        { length: meta._chunks },
                        (_, i) => loadCantonChunk(cantonId, i),
                    );
                }
                const chunks = await Promise.all(chunkPromises);
                return {
                    n: chunks.flatMap((c) => c.n),
                    t: chunks.flatMap((c) => c.t),
                    lat: chunks.flatMap((c) => c.lat),
                    lng: chunks.flatMap((c) => c.lng),

                });

                // Map — MapLibre + CartoDB Dark Matter (OSM, no token required)
                map = new maplibregl.Map({
                    container: "map",
                    style: {
                        version: 8,
                        sources: {
                            "carto-dark": {
                                type: "raster",
                                tiles: [
                                    "https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png",
                                    "https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png",
                                    "https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png",
                                ],
                                tileSize: 256,
                                attribution:
                                    "© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> © <a href='https://carto.com/attributions'>CARTO</a>",
                            },
                        },
                        layers: [
                            {
                                id: "background",
                                type: "background",
                                paint: { "background-color": "#0b0f1a" },
                            },
                            {
                                id: "carto-dark",
                                type: "raster",
                                source: "carto-dark",
                                paint: {
                                    "raster-brightness-min": 0.07,
                                    "raster-hue-rotate": 210,
                                    "raster-saturation": 0.4,
                                    "raster-contrast": -0.1,
                                    "raster-fade-duration": 0,
                                },
                            },
                        ],
                    },
                    center: [7.58, 47.56],
                    zoom: 12,
                    minZoom: 6,
                    maxZoom: 16,
                    pitch: 0,
                    bearing: 0,
                    antialias: true,
                    dragRotate: true,
                });

                overlay = new deck.MapboxOverlay({ layers: [buildLayer()] });

                map.on("load", async () => {
                    map.addControl(overlay);
                    map.addControl(
                        new maplibregl.NavigationControl({
                            visualizePitch: true,
                        }),
                        "bottom-right",
                    );

                    map.flyTo({
                        center: [BERN.lng, BERN.lat],
                        zoom: 11,
                        duration: 1500,
                    });

                    activeCantons.add("BE");
                    const el = document.querySelector('.canton-item[data-id="BE"]');
                    if (el) {
                        el.classList.add("active");
                        el.classList.remove("inactive");
                    }
                    await loadCantonData(_cantonById.get("BE"));
                    refreshLayer();

                    const ls = document.getElementById("loading-screen");
                    ls.classList.add("hidden");
                    setTimeout(() => ls.remove(), 450);
                });

                map.on("zoom", () => {
                    if (nightView) {
                        document.getElementById("night-intensity").value =
                            effectiveIntensity();
                        refreshLayer();
                    }
                });

                document
                    .getElementById("tooltip-close")
                    .addEventListener("click", () => {
                        document.getElementById("tooltip").style.display =
                            "none";
                    });

                // ── Legend toggles ─────────────────────────────────────────────────
                document
                    .getElementById("legend-items")
                    .addEventListener("click", (e) => {
                        const item = e.target.closest(".legend-item");
                        if (!item) return;
                        const lbl = item.dataset.label;
                        if (activeLabels.has(lbl)) {
                            activeLabels.delete(lbl);
                            item.classList.add("inactive");
                            item.setAttribute("aria-checked", "false");
                        } else {
                            activeLabels.add(lbl);
                            item.classList.remove("inactive");
                            item.setAttribute("aria-checked", "true");
                        }
                        refreshLayer();
                    });

                document
                    .getElementById("btn-select-all")
                    .addEventListener("click", () => {
                        colorAssignments.forEach((a) =>
                            activeLabels.add(a.label),
                        );
                        document
                            .querySelectorAll(".legend-item")
                            .forEach((el) => { el.classList.remove("inactive"); el.setAttribute("aria-checked", "true"); });
                        refreshLayer();
                    });

                document
                    .getElementById("btn-deselect-all")
                    .addEventListener("click", () => {
                        activeLabels.clear();
                        document
                            .querySelectorAll(".legend-item")
                            .forEach((el) => { el.classList.add("inactive"); el.setAttribute("aria-checked", "false"); });
                        refreshLayer();
                    });

                document
                    .getElementById("btn-night-view")
                    .addEventListener("click", () => {
                        nightView = !nightView;
                        const btn = document.getElementById("btn-night-view");
                        btn.classList.toggle("active", nightView);
                        btn.setAttribute("aria-pressed", nightView ? "true" : "false");
                        document
                            .getElementById("night-intensity-row")
                            .classList.toggle("visible", nightView);
                        refreshLayer();
                    });

                document
                    .getElementById("night-intensity")
                    .addEventListener("input", (e) => {
                        anchorIntensity = +e.target.value;
                        anchorZoom = map.getZoom();
                        refreshLayer();
                    });

                // ── Canton all / none ──────────────────────────────────────────────
                document
                    .getElementById("btn-canton-all")
                    .addEventListener("click", async () => {
                        await Promise.all(
                            CANTONS.map((c) => loadCantonData(c)),
                        );
                        CANTONS.forEach((c) => activeCantons.add(c.id));
                        document
                            .querySelectorAll(".canton-item")
                            .forEach((el) => {
                                el.classList.add("active");
                                el.classList.remove("inactive");
                            });
                        refreshLayer();
                    });

                document
                    .getElementById("btn-canton-none")
                    .addEventListener("click", () => {
                        activeCantons.clear();
                        document
                            .querySelectorAll(".canton-item")
                            .forEach((el) => {
                                el.classList.remove("active");
                                el.classList.add("inactive");
                            });
                        refreshLayer();
                    });
            });

            // ── Tooltip helper (shared by hover + tap) ─────────────────────────────
            function showTooltip(info) {
                const tt = document.getElementById("tooltip");
                if (!info.object) {
                    tt.style.display = "none";
                    return;
                }

                const list = info.object.companies.filter((c) =>
                    activeLabels.has(c.label),
                );
                const MAX = 10;
                const rows = list
                    .slice(0, MAX)
                    .map((c) => {
                        const hex = _labelToHex.get(c.label) ?? "#888";
                        return `
        <div style="border-top:1px solid rgba(255,255,255,0.06);margin-top:8px;padding-top:8px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:${hex}"></span>
            <span style="color:#fff;font-weight:500;font-size:13px">${c.name}</span>
          </div>
          <div style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:3px">${c.rechtsform}</div>
          <div style="color:rgba(255,255,255,0.3);font-size:11px">${c.address}</div>
        </div>`;
                    })
                    .join("");
                const more =
                    list.length > MAX
                        ? `<div style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:8px">+${list.length - MAX} more</div>`
                        : "";

                tt.style.display = "block";
                tt.style.left =
                    Math.min(info.x + 15, window.innerWidth - 340) + "px";
                tt.style.top =
                    Math.min(info.y + 15, window.innerHeight - 220) + "px";
                document.getElementById("tooltip-content").innerHTML = `
        <div style="color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:.05em;text-transform:uppercase">
          ${list.length} ${list.length === 1 ? "company" : "companies"} · ${info.object.canton}
        </div>
        ${rows}${more}`;
            }

            // ── Panel toggles ──────────────────────────────────────────────────────
            document
                .getElementById("toggle-canton")
                .addEventListener("click", () => {
                    const panel = document.getElementById("canton-panel");
                    const btn = document.getElementById("toggle-canton");
                    if (window.innerWidth > 980) {
                        panel.classList.toggle("collapsed");
                        btn.setAttribute("aria-expanded", panel.classList.contains("collapsed") ? "false" : "true");
                    } else {
                        panel.classList.toggle("open");
                        btn.setAttribute("aria-expanded", panel.classList.contains("open") ? "true" : "false");
                        document.getElementById("legend").classList.remove("open");
                        document.getElementById("toggle-legend").setAttribute("aria-expanded", "false");
                    }
                });
            document
                .getElementById("toggle-legend")
                .addEventListener("click", () => {
                    const panel = document.getElementById("legend");
                    const btn = document.getElementById("toggle-legend");
                    if (window.innerWidth > 980) {
                        panel.classList.toggle("collapsed");
                        btn.setAttribute("aria-expanded", panel.classList.contains("collapsed") ? "false" : "true");
                    } else {
                        panel.classList.toggle("open");
                        btn.setAttribute("aria-expanded", panel.classList.contains("open") ? "true" : "false");
                        document.getElementById("canton-panel").classList.remove("open");
                        document.getElementById("toggle-canton").setAttribute("aria-expanded", "false");
                    }
                });

            // In-panel collapse arrows (desktop)
            document.getElementById("collapse-canton").addEventListener("click", () => {
                document.getElementById("canton-panel").classList.add("collapsed");
                document.getElementById("toggle-canton").setAttribute("aria-expanded", "false");
            });
            document.getElementById("collapse-legend").addEventListener("click", () => {
                document.getElementById("legend").classList.add("collapsed");
                document.getElementById("toggle-legend").setAttribute("aria-expanded", "false");
            });

            // Click on map closes panels
            document.getElementById("map").addEventListener("click", (e) => {
                if (e.target.id === "map" || e.target.classList.contains("maplibregl-canvas")) {
                    document.getElementById("canton-panel").classList.remove("open");
                    document.getElementById("legend").classList.remove("open");
                }
            });

            // ── Search ─────────────────────────────────────────────────────────────
            const ROW_H = 36;
            let searchTimer = null;
            let _detachScroll = null;
            let activeHitIndex = -1, currentHits = [], currentRenderFn = null, currentResultsEl = null;

            function closeResults() {
                if (_detachScroll) { _detachScroll(); _detachScroll = null; }
                document.getElementById("search-results").style.display = "none";
                document.getElementById("search-clear").style.display = "none";
                document.getElementById("search-count").style.display = "none";
            }

            function runSearch(query) {
                activeHitIndex = -1; currentHits = []; currentRenderFn = null; currentResultsEl = null;
                const q = query.trim().toLowerCase();
                const resultsEl = document.getElementById("search-results");
                const clearBtn = document.getElementById("search-clear");
                const countEl = document.getElementById("search-count");

                if (_detachScroll) { _detachScroll(); _detachScroll = null; }
                clearBtn.style.display = q ? "block" : "none";

                if (!q) {
                    resultsEl.style.display = "none";
                    countEl.style.display = "none";
                    return;
                }

                // collect ALL matching indices
                const hits = [];
                if (globalSearchIndex) {
                    const src = globalSearchIndex._nLower;
                    for (let i = 0; i < src.length; i++) {
                        if (src[i].includes(q)) hits.push(i);
                    }
                } else {
                    for (let i = 0; i < searchIndex.length; i++) {
                        if (searchIndex[i].name.toLowerCase().includes(q)) hits.push(i);
                    }
                }

                if (hits.length === 0) {
                    resultsEl.innerHTML = `<div class="search-no-results">${globalSearchIndex ? "No results" : "No results in loaded cantons"}</div>`;
                    resultsEl.style.display = "block";
                    countEl.style.display = "none";
                    return;
                }

                countEl.textContent = hits.length.toLocaleString() + " result" + (hits.length === 1 ? "" : "s");
                countEl.style.display = "block";

                // virtual scroll container
                resultsEl.innerHTML = `<div style="position:relative;height:${hits.length * ROW_H}px"><div class="vs-slab" style="position:absolute;width:100%;top:0;will-change:transform"></div></div>`;
                resultsEl.style.display = "block";
                const slab = resultsEl.querySelector(".vs-slab");

                function renderRows() {
                    const top = resultsEl.scrollTop;
                    const visH = resultsEl.clientHeight;
                    const first = Math.max(0, Math.floor(top / ROW_H) - 3);
                    const last = Math.min(hits.length, Math.ceil((top + visH) / ROW_H) + 3);
                    slab.style.top = `${first * ROW_H}px`;

                    // recycle existing nodes when count matches to avoid full DOM churn
                    const needed = last - first;
                    while (slab.children.length > needed) slab.lastChild.remove();
                    while (slab.children.length < needed) slab.appendChild(document.createElement("div"));

                    for (let vi = 0; vi < needed; vi++) {
                        const idx = hits[first + vi];
                        let name, label, cantonId, lat, lng, point;
                        if (globalSearchIndex) {
                            const { n, t, c, lat: la, lng: lo } = globalSearchIndex;
                            const rf = T_DECODE[t[idx]] || t[idx];
                            name = n[idx]; label = getLabel(rf); cantonId = c[idx]; lat = la[idx]; lng = lo[idx];
                        } else {
                            ({ name, label, cantonId, point } = searchIndex[idx]);
                        }
                        const hex = _labelToHex.get(label) ?? "#888";
                        const el = slab.children[vi];
                        el.className = "search-result-item" + (first + vi === activeHitIndex ? " keyboard-active" : "");

                        // only rebuild innerHTML if row changed (keyed by index)
                        if (el.dataset.idx !== String(idx)) {
                            el.dataset.idx = idx;
                            const dot = Object.assign(document.createElement("div"), { className: "legend-color" });
                            dot.style.background = hex;
                            const badge = Object.assign(document.createElement("span"), { className: "canton-badge", textContent: cantonId });
                            const nameEl = Object.assign(document.createElement("span"), { className: "search-result-name", textContent: name });
                            el.replaceChildren(dot, badge, nameEl);
                            el.onclick = () => {
                                const center = lat !== undefined ? [lng, lat] : point.position;
                                map.flyTo({ center, zoom: 14, duration: 800 });

                                // Find the exact cluster position used by the deck.gl dot
                                function resolvePos() {
                                    if (lat === undefined) return point.position;
                                    const pts = cantonData[cantonId];
                                    if (!pts) return [lng, lat];
                                    const k = Math.round(lat * 1e5) * 1000000 + Math.round(lng * 1e5);
                                    for (const p of pts) {
                                        const pk = Math.round(p.position[1] * 1e5) * 1000000 + Math.round(p.position[0] * 1e5);
                                        if (pk === k) return p.position;
                                    }
                                    return [lng, lat];
                                }

                                function placeMarker() {
                                    if (blinkMarker) blinkMarker.remove();
                                    const markerEl = document.createElement("div");
                                    markerEl.className = "blink-marker";
                                    blinkMarker = new maplibregl.Marker(markerEl).setLngLat(resolvePos()).addTo(map);
                                    setTimeout(() => { if (blinkMarker) { blinkMarker.remove(); blinkMarker = null; } }, 3000);
                                }

                                if (!activeCantons.has(cantonId)) {
                                    activeCantons.add(cantonId);
                                    const ci = document.querySelector(`.canton-item[data-id="${cantonId}"]`);
                                    if (ci) { ci.classList.add("active"); ci.classList.remove("inactive"); }
                                    loadCantonData(_cantonById.get(cantonId)).then(() => { refreshLayer(); placeMarker(); });
                                } else {
                                    placeMarker();
                                }

                                document.getElementById("search-input").value = "";
                                closeResults();
                            };
                        }
                    }
                }

                resultsEl.addEventListener("scroll", renderRows, { passive: true });
                _detachScroll = () => resultsEl.removeEventListener("scroll", renderRows);
                currentHits = hits; currentRenderFn = renderRows; currentResultsEl = resultsEl;
                renderRows();
            }

            document.getElementById("search-input").addEventListener("input", (e) => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => runSearch(e.target.value), 300);
            });

            document.getElementById("search-input").addEventListener("keydown", (e) => {
                if (!currentHits.length) return;
                if (e.key === "ArrowDown" || e.key === "ArrowUp") {
                    e.preventDefault();
                    activeHitIndex = e.key === "ArrowDown"
                        ? Math.min(activeHitIndex + 1, currentHits.length - 1)
                        : Math.max(activeHitIndex - 1, 0);
                    const top = activeHitIndex * ROW_H;
                    const bot = top + ROW_H;
                    if (top < currentResultsEl.scrollTop) currentResultsEl.scrollTop = top;
                    else if (bot > currentResultsEl.scrollTop + currentResultsEl.clientHeight) currentResultsEl.scrollTop = bot - currentResultsEl.clientHeight;
                    currentRenderFn?.();
                } else if (e.key === "Enter" && activeHitIndex >= 0) {
                    currentResultsEl?.querySelector(".keyboard-active")?.click();
                } else if (e.key === "Escape") {
                    closeResults();
                }
            });

            document.getElementById("search-input").addEventListener("focus", () => {
                if (globalSearchIndex || globalSearchIndex === false) return;
                globalSearchIndex = false; // loading sentinel
                const icon = document.getElementById("search-icon");
                const input = document.getElementById("search-input");
                icon.classList.add("loading");
                input.placeholder = "Loading search index…";
                gunzipJson("data/search_index.json.gz").then(data => {
                    data._nLower = data.n.map(s => s.toLowerCase());
                    globalSearchIndex = data;
                    icon.classList.remove("loading");
                    input.placeholder = "Search 760k companies…";
                    const q = input.value;
                    if (q.trim()) runSearch(q);
                }).catch(() => {
                    globalSearchIndex = null;
                    icon.classList.remove("loading");
                    input.placeholder = "Search companies…";
                });
            }, { once: true });

            document.getElementById("search-clear").addEventListener("click", () => {
                document.getElementById("search-input").value = "";
                closeResults();
            });

            document.addEventListener("click", (e) => {
                if (!document.getElementById("search-bar").contains(e.target)) closeResults();
            });

            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("./sw.js").catch(() => {});
            }
        </script>
    </body>
</html>
